<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | Grand Solace Hotel</title>

{% load static %}

<link rel="stylesheet" href="{% static 'styles/navbar.css' %}">
<link rel="stylesheet" href="{% static 'styles/profile.css' %}">
</head>

<body>

{% include 'components/navbar.html' %}

<div class="profile-wrapper">

    <div class="profile-card">

        <!-- LEFT -->
        <div class="profile-left">

            <label for="uploadPic">
                <img id="profileImage"
                     src="{% static 'images/anonymous.png' %}"
                     class="profile-pic">
            </label>

            <input type="file" id="uploadPic" accept="image/*">

            <button class="edit-pic-btn">Edit Picture</button>

        </div>

        <!-- RIGHT -->
        <div class="profile-right">

            <div class="top-row">
    <div class="name" id="profileName" contenteditable="false">John Doe</div>
    <span class="badge">Guest</span>
</div>

<div class="email" id="profileEmail" contenteditable="false">johndoe@email.com</div>

            <div class="info-grid">

                <div class="info-box">
    <span>Phone</span>
    <p id="profilePhone" contenteditable="false">+63 912 345 6789</p>
</div>

<div class="info-box">
    <span>Address</span>
    <p id="profileAddress" contenteditable="false">Davao City, Philippines</p>
</div>

                <div class="info-box">
                    <span>Account Created</span>
                    <p>Jan 1, 2026</p>
                </div>

                <div class="info-box">
                    <span>Last Login</span>
                    <p>Today</p>
                </div>

            </div>

            <div class="date">
                Total Bookings: <b>3</b>
            </div>

            <div class="actions">
                <button class="edit-details-btn" id="editBtn" onclick="toggleEdit()">Edit Details</button>
        </div>
        </div>

    </div>

</div>

<script>
    let isEditing = false;

function toggleEdit() {
    const name = document.getElementById("profileName");
    const email = document.getElementById("profileEmail");
    const phone = document.getElementById("profilePhone");
    const address = document.getElementById("profileAddress");
    const btn = document.getElementById("editBtn");

    const fields = [name, email, phone, address];

    if (!isEditing) {
        // ENABLE EDIT MODE
        fields.forEach(field => {
            field.contentEditable = true;
            field.style.outline = "2px solid #ccc";
            field.style.borderRadius = "6px";
            field.style.padding = "4px";
            field.style.background = "#f9f9f9";
        });

        name.focus();

        btn.innerText = "Save Details";
        btn.style.background = "#0f172a";

        isEditing = true;

    } else {
        // DISABLE EDIT MODE
        fields.forEach(field => {
            field.contentEditable = false;
            field.style.outline = "none";
            field.style.background = "transparent";
            field.style.padding = "0";
        });

        btn.innerText = "Edit Details";
        btn.style.background = "#222";

        isEditing = false;

        alert("Profile updated!");
    }
}

const uploadPic = document.getElementById("uploadPic");
const profileImage = document.getElementById("profileImage");

uploadPic.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
        profileImage.src = URL.createObjectURL(file);
    }
});
</script>

</body>
</html>
