<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Details | Grand Solace Hotel</title>

{% load static %}

<link rel="stylesheet" href="{% static 'styles/navbar.css' %}">
<link rel="stylesheet" href="{% static 'styles/details.css' %}">

</head>

<body>

{% include 'components/navbar.html' %}

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1 id="roomName">Room</h1>
        <p id="roomTagline">Comfort and elegance</p>
    </div>
</div>

<div class="container">

    <div class="left">

        <div class="card">
            <h2>Description</h2>
            <p id="desc1"></p>
            <p id="desc2"></p>
        </div>

        <div class="card">
            <h2>Room Gallery</h2>
            <div class="gallery" id="gallery"></div>
        </div>

        <div class="card">
            <h2>Amenities</h2>
            <ul class="amenities" id="amenities"></ul>
        </div>

    </div>

<div class="right">

    <div class="booking" id="bookingCard">

        <!-- ✅ FORM NOW CONNECTED TO DJANGO -->
        <form method="POST">
        {% csrf_token %}

        <!-- hidden room -->
        <input type="hidden" name="room" id="roomInput">

        <div class="price-block">
            <div class="price" id="price"></div>
            <p class="price-note">per night • taxes included</p>
        </div>

        <div class="divider"></div>

        <div class="field">
            <label>Check-in Date</label>
            <input type="date" name="datePicker" id="datePicker" required>
        </div>

        <div class="field">
            <label>Full Name</label>
            <input type="text" name="fullName" id="fullName" required>
        </div>

        <div class="field">
            <label>Contact Number</label>
            <input type="tel" name="contactNumber" id="contactNumber" required>
        </div>

        <div class="field">
            <label>Email Address</label>
            <input type="email" name="emailAddress" id="emailAddress" required>
        </div>

        <div class="field">
            <label>Guests</label>
            <select name="guests" id="guests">
                <option value="1 Guest">1 Guest</option>
                <option value="2 Guests">2 Guests</option>
                <option value="3 Guests">3 Guests</option>
                <option value="4 Guests">4 Guests</option>
            </select>
        </div>

        <button type="submit">Book Now</button>

        </form>

    </div>

</div>

<script>

const rooms = {
    single: { name: "Single Room", price: "₱2,000 / night", hero: "{% static 'images/single.png' %}" },
    twin: { name: "Twin Room", price: "₱3,200 / night", hero: "{% static 'images/twin.png' %}" },
    standard: { name: "Standard Room", price: "₱3,900 / night", hero: "{% static 'images/standard.png' %}" },
    family: { name: "Family Room", price: "₱5,000 / night", hero: "{% static 'images/family.png' %}" },
    deluxe: { name: "Deluxe Room", price: "₱5,500 / night", hero: "{% static 'images/deluxe.png' %}" },
    suite: { name: "Suite Room", price: "₱7,000 / night", hero: "{% static 'images/suite.png' %}" },
    superior: { name: "Superior Room", price: "₱8,500 / night", hero: "{% static 'images/superior.png' %}" },
    executive: { name: "Executive Room", price: "₱10,000 / night", hero: "{% static 'images/executive.png' %}" },
    seaview: { name: "Sea View Suite", price: "₱12,500 / night", hero: "{% static 'images/sea.png' %}" },
    penthouse: { name: "Penthouse Room", price: "₱20,000 / night", hero: "{% static 'images/penthouse.png' %}" }
};

const params = new URLSearchParams(window.location.search);
const roomKey = params.get("room");

if (!rooms[roomKey]) {
    window.location.href = "/rooms/";
}

const room = rooms[roomKey];

// set hidden input value
document.getElementById("roomInput").value = roomKey;

// display
document.querySelector(".hero").style.backgroundImage = `url('${room.hero}')`;
document.getElementById("roomName").innerText = room.name;
document.getElementById("price").innerText = room.price;

</script>

</body>
</html>
