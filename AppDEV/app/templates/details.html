<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Details | Grand Solace Hotel</title>

{% load static %}

<link rel="stylesheet" href="{% static 'styles/navbar.css' %}">
<link rel="stylesheet" href="{% static 'styles/details.css' %}">

</head>

<body>

{% include 'components/navbar.html' %}

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1 id="roomName">Room</h1>
        <p id="roomTagline">Comfort and elegance</p>
    </div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <!-- DESCRIPTION -->
        <div class="card">
            <h2>Description</h2>

            <p id="desc1"></p>
            <p id="desc2"></p>
        </div>

        <!-- GALLERY -->
        <div class="card">
            <h2>Room Gallery</h2>
            <div class="gallery" id="gallery"></div>
        </div>

        <!-- AMENITIES -->
        <div class="card">
            <h2>Amenities</h2>
            <ul class="amenities" id="amenities"></ul>
        </div>

    </div>

<div class="right">

    <div class="right">

    <div class="booking" id="bookingCard">

        <form id="bookingForm" onsubmit="bookNow(event)">

        <!-- PRICE HEADER -->
        <div class="price-block">
            <div class="price" id="price"></div>
            <p class="price-note">per night • taxes included</p>
        </div>

        <!-- DIVIDER -->
        <div class="divider"></div>

        <!-- DATE -->
        <div class="field">
            <label>Check-in Date</label>
            <input type="date" id="datePicker" required>
        </div>

        <!-- FULL NAME -->
        <div class="field">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <!-- CONTACT NUMBER -->
        <div class="field">
            <label>Contact Number</label>
            <input type="tel" id="contactNumber" placeholder="09XXXXXXXXX" required>
        </div>

        <!-- EMAIL -->
        <div class="field">
            <label>Email Address</label>
            <input type="email" id="emailAddress" placeholder="you@example.com" required>
        </div>

        <!-- GUESTS -->
        <div class="field">
            <label>Guests</label>
            <div class="select-wrapper">
                <select id="guests" required>
                    <option value="1 Guest">1 Guest</option>
                    <option value="2 Guests">2 Guests</option>
                    <option value="3 Guests">3 Guests</option>
                    <option value="4 Guests">4 Guests</option>
                </select>
            </div>
        </div>

        <!-- BENEFITS -->
        <div class="benefits">
            <p>✔ Free cancellation</p>
            <p>✔ Instant confirmation</p>
            <p>✔ Secure booking</p>
        </div>

        <!-- NOTE -->
        <div class="note">
            Check-in 2:00 PM • Check-out 12:00 PM
        </div>

        <!-- CTA -->
        <button type="submit">Book Now</button>

        </form>

    </div>

</div>

// GET ROOM FROM URL
const params = new URLSearchParams(window.location.search);
const roomKey = params.get("room");

// FALLBACK
if (!rooms[roomKey]) {
    window.location.href = "/rooms/";
}

// LOAD DATA
const room = rooms[roomKey];

// HERO
document.querySelector(".hero").style.backgroundImage = `url('${room.hero}')`;

// TITLE + TAGLINE
document.getElementById("roomName").innerText = room.name;
document.getElementById("roomTagline").innerText = "Luxury comfort awaits";

// DESCRIPTION
document.getElementById("desc1").innerText = room.desc[0];
document.getElementById("desc2").innerText = room.desc[1];

// PRICE
document.getElementById("price").innerText = room.price;

// GALLERY
document.getElementById("gallery").innerHTML =
    room.images.map(img => `<img src="${img}">`).join("");

// AMENITIES
document.getElementById("amenities").innerHTML =
    room.amenities.map(a => `<li>${a}</li>`).join("");


// DATE LOGIC
const unavailableDates = [
    "2026-04-25",
    "2026-04-26",
    "2026-05-01"
];

const dateInput = document.getElementById("datePicker");

dateInput.addEventListener("input", function () {
    if (unavailableDates.includes(this.value)) {
        alert("This date is unavailable!");
        this.value = "";
    }
});

document.getElementById("summaryRoom").innerText = room.name;

// date update
dateInput.addEventListener("input", function () {
    if (unavailableDates.includes(this.value)) {
        alert("This date is unavailable!");
        this.value = "";
    } else {
        document.getElementById("summaryDate").innerText = this.value;
    }
});

const booking = document.getElementById("bookingCard");
const rightColumn = document.querySelector(".right");
const stopPoint = document.querySelector(".container");

const offsetTop = booking.offsetTop;

window.addEventListener("scroll", () => {
    const scrollY = window.scrollY;

    const containerBottom = stopPoint.offsetTop + stopPoint.offsetHeight;
    const bookingHeight = booking.offsetHeight;

    // start floating
    if (scrollY > offsetTop && scrollY + bookingHeight < containerBottom) {
        booking.classList.add("fixed");
    } else {
        booking.classList.remove("fixed");
    }
});

// guests update
const guestSelect = document.getElementById("guests");
guestSelect.addEventListener("change", function () {
    document.getElementById("summaryGuests").innerText = this.value;
});

// BOOK
function bookNow(event) {
    event.preventDefault();

    const form = document.getElementById("bookingForm");

    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    let name = document.getElementById("fullName").value.trim();
    let contact = document.getElementById("contactNumber").value.trim();
    let email = document.getElementById("emailAddress").value.trim();
    let date = document.getElementById("datePicker").value;
    let guests = document.getElementById("guests").value;

    alert(
        "Booking Confirmed!\n\n" +
        "Name: " + name + "\n" +
        "Contact: " + contact + "\n" +
        "Email: " + email + "\n" +
        "Room: " + room.name + "\n" +
        "Date: " + date + "\n" +
        "Guests: " + guests
    );
}
