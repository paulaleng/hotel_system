<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Grand Solace Hotel</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'styles/user_auth.css' %}">
</head>
<body>

<div class="left-panel"></div>

<div class="right-panel">
    <div class="auth-box">

        <h1>🔐 Verify Email</h1>
        <p>Enter the verification code sent to your email</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="email-info">
            ✉️ Code sent to: <strong>{{ email }}</strong>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <label>Verification Code</label>
                <input 
                    type="text" 
                    name="code" 
                    placeholder="000000" 
                    maxlength="6" 
                    pattern="[0-9]{6}"
                    required
                    style="font-size: 18px; letter-spacing: 3px; text-align: center;"
                >
            </div>

            <button type="submit" class="btn">✓ Verify Code</button>
        </form>

        <button type="button" class="btn btn-secondary" onclick="resendCode()" style="margin-top: 12px;">
            🔄 Resend Code
        </button>

        <p class="timer">Code expires in 10 minutes. Request a new one if it expires.</p>

        <p class="switch">
            <a href="{% url 'login' %}">← Back to Login</a>
        </p>

    </div>
</div>

<style>
    .email-info {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
        color: #666;
        margin-bottom: 20px;
        text-align: center;
        border-left: 3px solid #b89b5e;
    }

    .timer {
        text-align: center;
        font-size: 12px;
        color: #999;
        margin-top: 12px;
    }

    .btn-secondary {
        background: #e8dcc8;
        color: #5c4a1f;
        border: 1px solid #b89b5e;
    }

    .btn-secondary:hover {
        background: #d9cdb8;
    }

    .alert {
        padding: 12px;
        margin-bottom: 16px;
        border-radius: 6px;
        font-size: 14px;
    }

    .alert.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .alert.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
</style>

<script>
    function resendCode() {
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '⏳ Sending...';

        fetch('{% url "resend_code" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('✓ ' + data.message);
                btn.textContent = '🔄 Resend Code';
                btn.disabled = false;
            } else {
                alert('✗ ' + data.message);
                btn.textContent = '🔄 Resend Code';
                btn.disabled = false;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
            btn.textContent = '🔄 Resend Code';
            btn.disabled = false;
        });
    }

    document.querySelector('input[name="code"]').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>

</body>
</html>
