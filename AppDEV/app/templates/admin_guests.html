<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Guests</title>

  {% load static %}
  <link rel="stylesheet" href="{% static 'styles/admin_guests.css' %}">
</head>

<body>

<div class="container">

  {% include "components/sidebar.html" %}

  <main class="main">

    <header class="topbar">
      <h1></h1>

      <input type="text" id="searchInput" placeholder="Search guests...">
    </header>

    <section class="table-section">

      <h2>Guest Accounts</h2>

      <table>

        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Date Created</th>
            <th>Total Bookings</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
             {% for guest in guests %}
  <tr>
    <td>{{ guest.username }}</td>
    <td>{{ guest.email }}</td>
    <td>{{ guest.date_joined|date:"M d, Y" }}</td>
    <td>--</td>
    <td>
      <form method="POST" action="{% url 'delete_guest' guest.id %}">
        {% csrf_token %}
        <button class="btn delete">Delete</button>
      </form>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="5">No guests found</td>
  </tr>
  {% endfor %}

        </tbody>
      </table>

    </section>

  </main>

</div>

<script>
document.getElementById("searchInput").addEventListener("keyup", function () {
  let filter = this.value.toLowerCase();
  let rows = document.querySelectorAll("table tbody tr");

  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(filter)
      ? ""
      : "none";
  });
});
</script>

</body>
</html>
